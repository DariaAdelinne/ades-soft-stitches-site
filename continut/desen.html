<h2>Ursuleț</h2>

<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs> 
    <!-- corp -->
    <linearGradient id="gradCorp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8793f" />
      <stop offset="100%" stop-color="#6e451f" />
    </linearGradient>

    <!-- urechi exterioare -->
    <linearGradient id="gradUrechiExt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b6330" />
      <stop offset="100%" stop-color="#6f431d" />
    </linearGradient>

    <!-- bot + interior urechi -->
    <radialGradient id="gradBot" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#efc08d" />
      <stop offset="100%" stop-color="#c98d56" />
    </radialGradient>

    <!-- cer -->
    <linearGradient id="gradCer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87ceeb" />
      <stop offset="100%" stop-color="#dff6ff" />
    </linearGradient>

    <!-- soare -->
    <radialGradient id="gradSoare" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff176" />
      <stop offset="100%" stop-color="#ff9800" />
    </radialGradient>

    <!-- iarbă -->
    <linearGradient id="gradIarba" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8fdb5b" />
      <stop offset="100%" stop-color="#4f9b2f" />
    </linearGradient>

    <!-- papion -->
    <linearGradient id="gradPapion" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4d4d" />
      <stop offset="100%" stop-color="#990000" />
    </linearGradient>
  </defs>

  <!-- cer -->
  <rect x="0" y="0" width="400" height="400" rx="25" ry="25" fill="url(#gradCer)" />

  <!-- soare -->
  <circle cx="60" cy="60" r="30" fill="url(#gradSoare)" />
  <line x1="60" y1="15" x2="60" y2="0" stroke="#ff9800" stroke-width="3" />
  <line x1="60" y1="105" x2="60" y2="120" stroke="#ff9800" stroke-width="3" />
  <line x1="15" y1="60" x2="0" y2="60" stroke="#ff9800" stroke-width="3" />
  <line x1="105" y1="60" x2="120" y2="60" stroke="#ff9800" stroke-width="3" />

  <!-- iarba -->
  <rect x="0" y="320" width="400" height="80" fill="url(#gradIarba)" />

  <!-- corp -->
  <ellipse cx="200" cy="255" rx="85" ry="95" fill="url(#gradCorp)" />

  <!-- picioare -->
  <ellipse cx="150" cy="335" rx="28" ry="40" fill="url(#gradCorp)" />
  <ellipse cx="250" cy="335" rx="28" ry="40" fill="url(#gradCorp)" />

  <!-- brate -->
  <ellipse cx="110" cy="215" rx="25" ry="60" fill="url(#gradCorp)"
           transform="rotate(-30 120 215)" />

  <g>
    <ellipse cx="275" cy="210" rx="25" ry="60" fill="url(#gradCorp)" />
    <animateTransform
      attributeName="transform"
      type="rotate"
      values="0 280 265; 30 280 265; 0 280 265"
      dur="1s"
      repeatCount="indefinite"/> 
  </g>

  <!-- cap -->
  <circle cx="200" cy="125" r="70" fill="url(#gradCorp)" />

  <!-- urechi -->
  <circle cx="145" cy="70" r="22" fill="url(#gradUrechiExt)" />
  <circle cx="255" cy="70" r="22" fill="url(#gradUrechiExt)" />
  <circle cx="145" cy="70" r="10" fill="url(#gradBot)" />
  <circle cx="255" cy="70" r="10" fill="url(#gradBot)" />

  <!-- ochi -->
  <circle cx="175" cy="120" r="5" fill="black" />
  <circle cx="225" cy="120" r="5" fill="black" />

  <!-- bot -->
  <ellipse cx="200" cy="150" rx="26" ry="18" fill="url(#gradBot)" />
  <circle cx="200" cy="145" r="5" fill="black" />

  <!-- gura -->
  <path d="M190 158 Q200 168 210 158" stroke="black" stroke-width="2" fill="none" />

  <!-- papion -->
  <polygon points="185,190 165,180 165,200" fill="url(#gradPapion)" />
  <polygon points="215,190 235,180 235,200" fill="url(#gradPapion)" />
  <circle cx="200" cy="190" r="6" fill="#7a0000" />
</svg>
