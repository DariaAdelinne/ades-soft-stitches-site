<section class="catalog-intro">
    <div class="section-heading">
        <p class="eyebrow">catalog</p>
        <h2>Produse și colecții</h2>
        <p>Alege o categorie pentru a vedea modelele, prețurile orientative și detaliile fiecărui pluș.</p>
    </div>
    <div id="colectii-lista" class="colectii-grid"></div>
</section>

<section id="produse-colectie" class="sectiune-produse" hidden>
    <div class="colectie-toolbar">
        <div class="section-heading compact">
            <p class="eyebrow">categorie selectată</p>
            <h3 id="titlu-colectie"></h3>
            <p id="descriere-colectie" class="descriere-colectie"></p>
        </div>
        <div class="controale-produse">
            <div class="filtru-produse">
                <label for="filtru-produse-select">Filtrează</label>
                <select id="filtru-produse-select"></select>
            </div>
            <div class="filtru-produse">
                <label for="sortare-produse-select">Sortează</label>
                <select id="sortare-produse-select">
                    <option value="ordine">Ordinea catalogului</option>
                    <option value="pret-crescator">Preț crescător</option>
                    <option value="pret-descrescator">Preț descrescător</option>
                    <option value="alfabetic">Alfabetic</option>
                </select>
            </div>
        </div>
    </div>
    <div id="produse-lista" class="produse-grid"></div>
</section>
