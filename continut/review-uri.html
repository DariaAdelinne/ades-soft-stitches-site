<section class="review-page">
    <div class="section-heading">
        <h2>Review-uri</h2>
        <p>
            Dacă ai primit deja un pluș de la Ade's Soft Stitches, poți lăsa aici câteva gânduri.
        </p>
    </div>

    <form id="formular-review" class="formular-review" method="POST" enctype="multipart/form-data">
        <div class="camp-capcana" aria-hidden="true">
            <label for="review-website">Nu completa acest câmp</label>
            <input type="text" id="review-website" name="website" tabindex="-1" autocomplete="off">
        </div>

        <label for="review-nume">Nume / prenume</label>
        <input type="text" id="review-nume" name="nume" required maxlength="100" placeholder="Numele tău">

        <label for="review-email">Email</label>
        <input type="email" id="review-email" name="email" required maxlength="254" autocomplete="email" placeholder="emailul tău">

        <fieldset class="rating-field">
            <legend>Rating</legend>
            <div class="rating-input" aria-label="Alege ratingul">
                <input type="radio" id="rating-5" name="rating" value="5" required>
                <label for="rating-5">★</label>
                <input type="radio" id="rating-4" name="rating" value="4">
                <label for="rating-4">★</label>
                <input type="radio" id="rating-3" name="rating" value="3">
                <label for="rating-3">★</label>
                <input type="radio" id="rating-2" name="rating" value="2">
                <label for="rating-2">★</label>
                <input type="radio" id="rating-1" name="rating" value="1">
                <label for="rating-1">★</label>
            </div>
        </fieldset>

        <label for="review-mesaj">Mesajul review-ului</label>
        <textarea id="review-mesaj" name="mesaj" rows="5" required minlength="10" maxlength="350" placeholder="Cum ți s-a părut plușul?"></textarea>
        <p class="counter-formular" data-review-counter aria-live="polite">0/350</p>

        <label for="review-produs">Produs comandat opțional</label>
        <input type="text" id="review-produs" name="produs" maxlength="120" placeholder="Ex: Axolotl, albinuță, comandă personalizată">

        <label for="review-poza">Poză opțională, maxim 1</label>
        <input type="file" id="review-poza" name="review_image" accept="image/jpeg,image/png,image/webp,image/heic,image/heif">
        <p class="ajutor-formular">Accept jpg, png, webp, heic sau heif.</p>

        <div class="check">
            <input type="checkbox" id="acord-publicare" name="acord_publicare" required>
            <label for="acord-publicare">Sunt de acord ca review-ul meu și poza încărcată, dacă există, să fie afișate pe site după aprobare.</label>
        </div>

        <button type="submit">Trimite review</button>
        <p id="mesaj-review" class="mesaj-formular" aria-live="polite"></p>
    </form>
</section>

<section>
    <div class="review-list-header">
        <h3>Ce spun clienții</h3>
        <div class="sortare-reviewuri">
            <label for="sortare-reviewuri">Sortează</label>
            <select id="sortare-reviewuri">
                <option value="recent">Cele mai recente</option>
                <option value="likes">Cele mai apreciate</option>
                <option value="images">Poze</option>
            </select>
        </div>
    </div>
    <div id="reviewuri-lista" class="review-grid" aria-live="polite"></div>
</section>
