[build]
  command = "python3 scripts/genereaza_catalog.py"
  publish = "continut"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: https://res.cloudinary.com https://*.cloudinary.com https://firebasestorage.googleapis.com https://storage.googleapis.com; connect-src 'self' https://*.firebaseio.com https://*.firebasedatabase.app https://europe-west1-ades-soft-stitches.cloudfunctions.net https://api.cloudinary.com; form-action 'self'; frame-src 'none'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
